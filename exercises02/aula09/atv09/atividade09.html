<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Fornulários</title>
</head>
<body>
    <form action="index.html">
        <label for="nome">Nome</label>
        <input type="text" name="nome" id="nome" placeholder="Digite seu nome aqui"><br>
        <label for="sobrenome">Sobrenome </label>
        <input type="text" name="sobrenome" id="sobrenome" placeholder="Digite seu sobrenome aqui"><br>
        <br>
        <label for="senha">Senha </label>
        <input type="password" name="senha" id="senha" ><br>

        <h2>Sexo</h2>
        <div><input type="radio" name="sexo" id="man" value="male">
            <label for="woman">Masculino</label>
        </div>
        <div><input type="radio" name="sexo" id="woman" value="female">
            <label for="woman">Feminino</label>
        <div>
        <div><input type="radio" name="sexo" id="none" value="nao">
            <label for="none">Não Declarado</label>
        <div>

        <h2>Marque as opções do seu interesse:</h2>
        <div>
            <input type="checkbox" name="tecnologias" id="asp">
            <label for="tecnologias">ASP.NET</label>
        </div>
        <div>
            <input type="checkbox" name="tecnologias" id="js">
            <label for="tecnologias">Javascript</label>
        </div>
        <div>
            <input type="checkbox" name="tecnologias" id="php">
            <label for="tecnologias">PHP</label>
        </div>
        <div>
            <input type="checkbox" name="tecnologias" id="py">
            <label for="tecnologias">Python</label>
        </div>

        <button type="submit">Enviar</button>

        </form>
    </form>
</body>
</html>
