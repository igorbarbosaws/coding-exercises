<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style49.css">
    <title>Atividade - Slide 49</title>
</head>
<body>
    <div class="container">

        <h1>PESQUISA</h1>

        <form>

            <label>Nome:</label>
            <input type="text" placeholder="Digite seu nome">

            <label>Idade:</label>
            <input type="number" placeholder="Digite sua idade">

            <div class="generos">

                <label>Gêneros de Filmes Favoritos:</label>
                <br><br>

                <input type="checkbox"> Ação
                <input type="checkbox"> Romance
                <input type="checkbox"> Comédia
                <br><br>

            <input type="checkbox"> Nacional
            <input type="checkbox"> Terror

            <input type="checkbox"> Outros
            <input type="text" placeholder="Qual gênero?">

            </div>

            <div class="filmes">

                <label>Quantos filmes você assiste por semana?</label>

                <br><br>

                <input type="radio" name="filmes"> 0
                <br>

                <input type="radio" name="filmes"> 1
                <br>

                <input type="radio" name="filmes"> 2
                <br>

                <input type="radio" name="filmes"> Mais de 2

            </div>

            <div class="botoes">

                <button type="submit" class="enviar">
                    ENVIAR
                </button>

                <button type="reset" class="limpar">
                    LIMPAR
                </button>

            </div>

        </form>

    </div>
</body>
</html>
